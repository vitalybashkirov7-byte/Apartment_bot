version: '3.8'

services:
  apartment-bot:
    build: .
    container_name: apartment-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MINIAPP_URL=${MINIAPP_URL:-http://localhost:5000}
      - PORT=5000
    volumes:
      - ./logs:/app/logs
      - ./bot.log:/app/bot.log
      - ./bot_stats.json:/app/bot_stats.json
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
